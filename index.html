<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 20px;
    }

    /* --- Przelacznik trybow --- */
    #modeSwitch {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: #94a3b8;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .mode-btn.active {
      background: #2563eb;
      color: white;
    }

    .mode-btn:hover:not(.active) {
      background: #475569;
    }

    /* --- Kategorie (wspolne dla obu trybow) --- */
    #categories button, #fiszkiCategories button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    #categories button:hover, #fiszkiCategories button:hover {
      background: #1d4ed8;
    }

    /* --- Quiz --- */
    .answers button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .answers button:hover:not(:disabled) {
      background: #475569;
    }

    .answers button:disabled {
      cursor: default;
    }

    .correct {
      background: #16a34a !important;
    }

    .wrong {
      background: #dc2626 !important;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      min-height: 20px;
    }

    .score {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

    .hidden {
      display: none;
    }

    #backBtn, #fiszkaBackBtn {
      margin-top: 15px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #475569;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    /* --- Fiszki --- */
    .fiszka-card {
      background: #0f172a;
      border: 2px solid #2563eb;
      border-radius: 14px;
      padding: 30px 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 19px;
      font-weight: 500;
      line-height: 1.5;
    }

    .fiszki-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 15px;
    }

    .fiszki-nav button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .fiszki-nav button:hover {
      background: #1d4ed8;
    }

    #fiszkaCounter {
      font-size: 14px;
      color: #94a3b8;
      white-space: nowrap;
    }

    #fiszkaShuffleBtn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: #e2e8f0;
      font-size: 14px;
      cursor: pointer;
    }

    #fiszkaShuffleBtn:hover {
      background: #475569;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="modeSwitch">
    <button id="modeQuizBtn" class="mode-btn active">Quiz</button>
    <button id="modeFiszkiBtn" class="mode-btn">Fiszki</button>
  </div>

  <!-- ===================== QUIZ ===================== -->
  <div id="quizMode">

    <h2 id="categoriesTitle">Wybierz dział</h2>
    <div id="categories"></div>

    <div id="quizArea" class="hidden">
      <h2 id="question">Ładowanie...</h2>
      <div id="answers" class="answers"></div>
      <p id="result"></p>
      <p class="score">Wynik: <span id="score">0</span></p>
      <button id="backBtn">← Wróć do działów</button>
    </div>

  </div>

  <!-- ===================== FISZKI ===================== -->
  <div id="fiszkiMode" class="hidden">

    <h2 id="fiszkiCategoriesTitle">Wybierz dział</h2>
    <div id="fiszkiCategories"></div>

    <div id="fiszkiCardArea" class="hidden">
      <div id="fiszkaCard" class="fiszka-card">Ładowanie...</div>
      <div class="fiszki-nav">
        <button id="fiszkaPrevBtn">← Poprzednia</button>
        <span id="fiszkaCounter">1/1</span>
        <button id="fiszkaNextBtn">Następna →</button>
      </div>
      <button id="fiszkaShuffleBtn">🔀 Losuj kolejność</button>
      <button id="fiszkaBackBtn">← Wróć do działów</button>
    </div>

  </div>

</div>

<script>

/* ============================================================
   PRZELACZANIE TRYBOW
   ============================================================ */
const modeQuizBtn = document.getElementById("modeQuizBtn");
const modeFiszkiBtn = document.getElementById("modeFiszkiBtn");
const quizModeDiv = document.getElementById("quizMode");
const fiszkiModeDiv = document.getElementById("fiszkiMode");

modeQuizBtn.onclick = () => {
  modeQuizBtn.classList.add("active");
  modeFiszkiBtn.classList.remove("active");
  quizModeDiv.classList.remove("hidden");
  fiszkiModeDiv.classList.add("hidden");
};

modeFiszkiBtn.onclick = () => {
  modeFiszkiBtn.classList.add("active");
  modeQuizBtn.classList.remove("active");
  fiszkiModeDiv.classList.remove("hidden");
  quizModeDiv.classList.add("hidden");
};

/* ============================================================
   QUIZ
   ============================================================ */
let questions = [];
let shuffled = [];
let currentIndex = 0;
let current = null;
let score = 0;

async function loadQuestions() {
  const res = await fetch("questions.json");
  questions = await res.json();
  createCategories();
}

function createCategories() {
  const categories = [...new Set(questions.map(q => q.category))];

  const div = document.getElementById("categories");
  div.innerHTML = "";

  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.innerText = category;
    btn.onclick = () => startQuiz(category);
    div.appendChild(btn);
  });
}

function startQuiz(category) {
  document.getElementById("categoriesTitle").classList.add("hidden");
  document.getElementById("categories").classList.add("hidden");
  document.getElementById("quizArea").classList.remove("hidden");

  shuffled = shuffleArray(
    questions.filter(q => q.category === category)
  );

  currentIndex = 0;
  score = 0;
  document.getElementById("score").innerText = score;

  nextQuestion();
}

function shuffleArray(array) {
  const arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (currentIndex >= shuffled.length) {
    document.getElementById("question").innerText = "Koniec działu 🎉";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("result").innerText =
      "Twój wynik: " + score + " / " + shuffled.length;
    return;
  }

  current = shuffled[currentIndex];
  currentIndex++;

  document.getElementById("result").innerText = "";
  document.getElementById("question").innerText = current.question;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  current.answers.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.innerText = answer;
    btn.onclick = () => checkAnswer(index);
    answers.appendChild(btn);
  });
}

function checkAnswer(index) {
  const buttons = document.querySelectorAll(".answers button");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === current.correct) b.classList.add("correct");
    if (i === index && index !== current.correct) b.classList.add("wrong");
  });

  if (index === current.correct) {
    document.getElementById("result").innerText = "Dobrze!";
    score++;
  } else {
    document.getElementById("result").innerText =
      "Źle. Poprawna: " + current.answers[current.correct];
  }

  document.getElementById("score").innerText = score;

  setTimeout(nextQuestion, 1500);
}

document.getElementById("backBtn").onclick = () => {
  document.getElementById("categoriesTitle").classList.remove("hidden");
  document.getElementById("categories").classList.remove("hidden");
  document.getElementById("quizArea").classList.add("hidden");
  createCategories();
};

/* ============================================================
   FISZKI
   ============================================================ */
let fiszki = [];
let fiszkiAktywne = [];
let fiszkaIndex = 0;

async function loadFiszki() {
  const res = await fetch("fiszki.json");
  fiszki = await res.json();
  createFiszkiCategories();
}

function createFiszkiCategories() {
  const categories = [...new Set(fiszki.map(f => f.category))];

  const div = document.getElementById("fiszkiCategories");
  div.innerHTML = "";

  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.innerText = category;
    btn.onclick = () => startFiszki(category);
    div.appendChild(btn);
  });
}

function startFiszki(category) {
  document.getElementById("fiszkiCategoriesTitle").classList.add("hidden");
  document.getElementById("fiszkiCategories").classList.add("hidden");
  document.getElementById("fiszkiCardArea").classList.remove("hidden");

  fiszkiAktywne = fiszki.filter(f => f.category === category);
  fiszkaIndex = 0;

  showFiszka();
}

function showFiszka() {
  const card = document.getElementById("fiszkaCard");
  const counter = document.getElementById("fiszkaCounter");

  if (fiszkiAktywne.length === 0) {
    card.innerText = "Brak fiszek w tym dziale.";
    counter.innerText = "0/0";
    return;
  }

  card.innerText = fiszkiAktywne[fiszkaIndex].text;
  counter.innerText = (fiszkaIndex + 1) + "/" + fiszkiAktywne.length;
}

document.getElementById("fiszkaNextBtn").onclick = () => {
  if (fiszkiAktywne.length === 0) return;
  fiszkaIndex = (fiszkaIndex + 1) % fiszkiAktywne.length;
  showFiszka();
};

document.getElementById("fiszkaPrevBtn").onclick = () => {
  if (fiszkiAktywne.length === 0) return;
  fiszkaIndex = (fiszkaIndex - 1 + fiszkiAktywne.length) % fiszkiAktywne.length;
  showFiszka();
};

document.getElementById("fiszkaShuffleBtn").onclick = () => {
  fiszkiAktywne = shuffleArray(fiszkiAktywne);
  fiszkaIndex = 0;
  showFiszka();
};

document.getElementById("fiszkaBackBtn").onclick = () => {
  document.getElementById("fiszkiCategoriesTitle").classList.remove("hidden");
  document.getElementById("fiszkiCategories").classList.remove("hidden");
  document.getElementById("fiszkiCardArea").classList.add("hidden");
  createFiszkiCategories();
};

/* ============================================================
   START
   ============================================================ */
loadQuestions();
loadFiszki();

</script>

</body>
</html>
