<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 20px;
    }

    #categories button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    #categories button:hover {
      background: #1d4ed8;
    }

    .answers button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .answers button:hover:not(:disabled) {
      background: #475569;
    }

    .answers button:disabled {
      cursor: default;
    }

    .correct {
      background: #16a34a !important;
    }

    .wrong {
      background: #dc2626 !important;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      min-height: 20px;
    }

    .score {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

    .hidden {
      display: none;
    }

    #backBtn {
      margin-top: 15px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #475569;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h2 id="categoriesTitle">Wybierz dział</h2>
  <div id="categories"></div>

  <div id="quizArea" class="hidden">
    <h2 id="question">Ładowanie...</h2>
    <div id="answers" class="answers"></div>
    <p id="result"></p>
    <p class="score">Wynik: <span id="score">0</span></p>
    <button id="backBtn">← Wróć do działów</button>
  </div>

</div>

<script>

let questions = [];
let shuffled = [];
let currentIndex = 0;
let current = null;
let score = 0;

async function loadQuestions() {
  const res = await fetch("questions.json");
  questions = await res.json();
  createCategories();
}

function createCategories() {
  const categories = [...new Set(questions.map(q => q.category))];

  const div = document.getElementById("categories");
  div.innerHTML = "";

  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.innerText = category;
    btn.onclick = () => startQuiz(category);
    div.appendChild(btn);
  });
}

function startQuiz(category) {
  document.getElementById("categoriesTitle").classList.add("hidden");
  document.getElementById("categories").classList.add("hidden");
  document.getElementById("quizArea").classList.remove("hidden");

  shuffled = shuffleArray(
    questions.filter(q => q.category === category)
  );

  currentIndex = 0;
  score = 0;
  document.getElementById("score").innerText = score;

  nextQuestion();
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function nextQuestion() {
  if (currentIndex >= shuffled.length) {
    document.getElementById("question").innerText = "Koniec działu 🎉";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("result").innerText =
      "Twój wynik: " + score + " / " + shuffled.length;
    return;
  }

  current = shuffled[currentIndex];
  currentIndex++;

  document.getElementById("result").innerText = "";
  document.getElementById("question").innerText = current.question;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  current.answers.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.innerText = answer;
    btn.onclick = () => checkAnswer(index);
    answers.appendChild(btn);
  });
}

function checkAnswer(index) {
  const buttons = document.querySelectorAll(".answers button");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === current.correct) b.classList.add("correct");
    if (i === index && index !== current.correct) b.classList.add("wrong");
  });

  if (index === current.correct) {
    document.getElementById("result").innerText = "Dobrze!";
    score++;
  } else {
    document.getElementById("result").innerText =
      "Źle. Poprawna: " + current.answers[current.correct];
  }

  document.getElementById("score").innerText = score;

  setTimeout(nextQuestion, 1500);
}

document.getElementById("backBtn").onclick = () => {
  document.getElementById("categoriesTitle").classList.remove("hidden");
  document.getElementById("categories").classList.remove("hidden");
  document.getElementById("quizArea").classList.add("hidden");
  createCategories();
};

loadQuestions();

</script>

</body>
</html>
